<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Chart.js</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: #F5F1E8;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: serif;
        }

        .container-grafico {
            width: 800px;
            height: 400px;
            background-color: #FFFDF9;
            border: 2px solid #E8D8BE;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .circulo{
            width: 150px;
            height: 150px;
            border-radius: 100%;
            background-color: transparent;
            border: 10px solid blue;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }
    </style>
</head>

<body>

    <div class="container-grafico">
        <canvas id="graficoTopLivros"></canvas>
    </div>

    <div class="circulo">
        60%
    </div>

    <script>
        const ctx = document.getElementById('graficoTopLivros');

        new Chart(ctx, {
            type: 'bar',

            data: {
                labels: [
                    'O Homem de Giz',
                    'Manual de assassinato',
                    'O Ladrão de Raios',
                    'O que aconteceu',
                    'Silêncio dos inocentes'
                ],

                datasets: [{
                    data: [1248, 978, 851, 742, 621],
                    backgroundColor: '#3E6335',
                    borderRadius: 12,
                    barThickness: 18
                }]
            },

            options: {
                indexAxis: 'y',

                responsive: true,
                maintainAspectRatio: false,

                plugins: {
                    legend: {
                        display: false
                    }
                },

                scales: {
                    x: {
                        beginAtZero: true,

                        grid: {
                            color: '#EADCC8'
                        },

                        ticks: {
                            color: '#6B5644'
                        }
                    },

                    y: {
                        grid: {
                            display: false
                        },

                        ticks: {
                            color: '#6B5644',
                            font: {
                                size: 14
                            }
                        }
                    }
                }
            }
        });
    </script>

</body>

</html>
