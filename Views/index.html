<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Estilos/style.css">
    <title>Biblioteca Virtual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="container-principal">
            <div class="nav-bar">
                <div class="elemento-nav-1">
                    <img src="../Img/pin1.png" alt="">
                    <h1>Biblioteca Virtual</h1>
                </div>
                <div class="elemento-nav-2">
                    <a href="#">Home</a>
                    <a href="#">Biblioteca</a>
                    <a href="#">Favoritos</a>
                    <a href="#">Sobre</a>
                </div>
                <div class="elemento-nav-3">
                    <p>Entrar</p>
                    <div class="elemento-nav-4">
                        <a href="#" class="botao-criar">
                            Criar Conta
                            <img src="../Img/pin2.png" alt="">
                        </a>
                    </div>
                </div>
            </div>
            <div class="container-introducao">
                <div class="container-auxiliar">
                    <div class="elemento-introducao-1">
                        <div class="elemento-introducao-2">
                            <img src="../Img/pin1.png" alt="">
                            <h3>SEJA BEM-VINDO A MINHA</h3>
                        </div>
                        <div class="elemento-introducao-3">
                            <h1>Biblioteca<br>Virtual</h1>
                        </div>
                        <div class="borboleta-hero">
                            <img src="../Img/borboleta.png" alt="Borboleta decorativa">
                        </div>
                        <div class="elemento-introducao-4">
                            <span class="linha"></span>
                        </div>
                        <div class="elemento-introducao-5">
                            <p>Um espaço para guardar e revisitar<br>
                                histórias que marcaram minha vida.</p>
                        </div>
                        <div class="elemento-introducao-6">
                            <a href="#" class="btn-explorar">Explorar Biblioteca</a>
                            <a href="#" class="btn-saiba">Saiba Mais</a>
                        </div>
                    </div>
                    <div class="elemento-introducao-7">
                        <img src="../Img/banner.png" alt="">
                    </div>
                </div>
            </div>
        </div>
    </div>

</html>
